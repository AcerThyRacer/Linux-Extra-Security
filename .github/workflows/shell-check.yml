name: shell-toolkit-checks

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shell toolkit checks
        run: |
          chmod +x bin/linux-extra-security tests/*.sh
          ./tests/smoke-test.sh
          ./tests/profile-test.sh
          ./tests/dry-run-test.sh
